const _mem = {};
window.storage = {
  async get(k){ try { const v = localStorage.getItem(k); return v==null? null : {key:k, value:v}; } catch { return _mem[k]? {key:k,value:_mem[k]} : null; } },

};

// Flatten graded units for a given junctional branch
function gradedUnits(junctional) {
  const units = [];
  for (const step of T1.steps) {
    if (step.branch && step.branch !== junctional) continue;
    if (step.subs) {
      units.push({ ...step, isHeader: true });
      for (const s of step.subs) units.push(s);
    } else {
      units.push(step);
    }
  }
  return units;
}

const gradeableOf = (units) => units.filter((u) => !u.isHeader);

// VOICE — Web Speech API with graceful fallback
// ============================================================
function useVoice() {
  const [status, setStatus] = useState("idle"); // idle|listening|blocked|unsupported
  const [transcript, setTranscript] = useState("");
  const recRef = useRef(null);
  useEffect(() => {
    const SR = window.SpeechRecognition || window.webkitSpeechRecognition;
    if (!SR) { setStatus("unsupported"); return; }
    const rec = new SR();
    rec.continuous = false;
    rec.interimResults = false;
    rec.lang = "en-US";
    rec.onresult = (e) => { setTranscript(e.results[0][0].transcript); setStatus("idle"); };
    rec.onerror = (e) => { setStatus(e.error === "not-allowed" || e.error === "service-not-allowed" ? "blocked" : "idle"); };
    rec.onend = () => setStatus((s) => (s === "listening" ? "idle" : s));
    recRef.current = rec;
  }, []);
  const listen = () => {
    if (!recRef.current) return;
    setTranscript("");
    try { setStatus("listening"); recRef.current.start(); } catch { setStatus("blocked"); }
  };
  const stop = () => { try { recRef.current && recRef.current.stop(); } catch {} };
  return { status, transcript, listen, stop, setTranscript };
}

function matchKeywords(transcript, kw) {
  if (!transcript || !kw || kw.length === 0) return { hit: [], miss: kw || [], pass: false };
  const t = transcript.toLowerCase();
  const hit = [], miss = [];
  for (const k of kw) (t.includes(k.toLowerCase()) ? hit : miss).push(k);
  return { hit, miss, pass: hit.length / kw.length >= 0.6 };
}

// ============================================================
// AI CADRE — judges the match, never the standard.
// Verbatim sheet text is injected as the sole authority.
// Calls go through the cadre proxy (Netlify Function), which
// holds the API key server-side — visitors never handle keys.
// ============================================================
const CADRE_PROXY = "https://efmb-trainer-cadre.netlify.app/.netlify/functions/cadre";

// Testing-phase access passphrase. Stored only in this browser; sent as a
// header so the proxy can gate access. When the gate is lifted server-side
// (env var removed), the proxy stops returning 401 and this is never needed.
const TOKEN_STORE = "efmb-cadre-token";
function getCadreToken() { try { return localStorage.getItem(TOKEN_STORE) || ""; } catch { return ""; } }
function saveCadreToken(t) { try { localStorage.setItem(TOKEN_STORE, t); } catch {} }

async function callClaude(prompt) {
  const r = await fetch(CADRE_PROXY, {
    method: "POST",
    headers: { "Content-Type": "application/json", "x-cadre-token": getCadreToken() },
    body: JSON.stringify({ prompt }),
  });
  if (r.status === 401) {
    try { window.dispatchEvent(new Event("cadre-gate-required")); } catch {}
    throw new Error("gated");
  }
  if (!r.ok) throw new Error("proxy error " + r.status);
  const d = await r.json();
  return d.text || null;
}

// Rubric store — the board's labeled GO/NO-GO decisions per step, kept in this
// browser (localStorage) for now. Each correction is fed back to the cadre so
// it grades consistently with what the board has taught it. (No model retraining
// happens; these are examples handed to the cadre on every grading.)
const RUBRIC_STORE = "efmb-t1-rubric";
function getRubric() { try { return JSON.parse(localStorage.getItem(RUBRIC_STORE) || "{}"); } catch { return {}; } }
function saveRubric(r) { try { localStorage.setItem(RUBRIC_STORE, JSON.stringify(r)); } catch {} }
function examplesFor(stepId) { const r = getRubric(); return r[stepId] || []; }
function addExample(stepId, recital, verdict) {
  if (!recital || !recital.trim()) return;
  const r = getRubric();
  const list = (r[stepId] || []).filter((e) => e.recital !== recital);
  list.push({ recital, verdict });
  r[stepId] = list.slice(-8); // cap so the prompt stays bounded
  saveRubric(r);
}
function exampleCount() { const r = getRubric(); return Object.values(r).reduce((n, l) => n + l.length, 0); }

async function askCadre(unit, transcript, examples) {
  const exBlock = (examples && examples.length)
    ? "The board has already graded these recitals for THIS exact step. Treat them as binding precedent and grade consistently with them:\n" +
      examples.map((e) => `- "${e.recital}" => ${e.verdict}`).join("\n") + "\n\n"
    : "";
  const p = `You are an EFMB evaluator grading a candidate's recall of ONE performance measure during train-up. The published measure (verbatim, MEDCoE PAM 350-10 Worksheet #T1) is the standard: "${unit.text}". Key elements: ${(unit.kw || []).join(", ")}. ${exBlock}The candidate, reciting from memory, said: "${transcript}". Decide GO or NO-GO: GO if the recital captures the substance of the published measure and is consistent with any board precedent above; NO-GO otherwise. Do not invent a medical standard of your own. Respond ONLY with JSON, no markdown fences: {"pass": true or false, "missing": ["element", ...], "correction": "1-2 sentences in the voice of a firm, professional evaluator; quote the exact words of the published measure for anything missed"}`;
  try {
    const text = await callClaude(p);
    if (!text) return { offline: true };
    const parsed = JSON.parse(text.replace(/```json|```/g, "").trim());
    if (typeof parsed.pass !== "boolean") return { offline: true };
    return parsed;
  } catch {
    return { offline: true };
  }
}

async function askAAR(taskTitle, missed, elapsedStr) {
  const list = missed.map((m) => `${m.id}. ${m.text}`).join("\n");
  const p = `You are an EFMB evaluator giving a brief after-action review during train-up week. Task: ${taskTitle}. Candidate's time: ${elapsedStr}. The candidate self-graded NO-GO on these published performance measures (verbatim from MEDCoE PAM 350-10):\n${list || "(none — clean run)"}\nGive a 3-5 sentence AAR: acknowledge what passed, address each miss by step number quoting key words of the published measure, and give one concrete focus for the next repetition. Do not introduce any standard not listed above. Plain text only.`;
  try {
    return (await callClaude(p)) || null;
  } catch {
    return null;
  }
}

    <div className="p-3 mt-3" style={{ border: "1.5px solid " + ink, background: "#FFF" }}>
      <div className="flex items-center justify-between">
        <p className="font-bold text-lg" style={{ fontFamily: mono, color: pass ? goGreen : noRed }}>
          TASK RESULT: {ungraded.length > 0 ? "INCOMPLETE" : pass ? "GO" : "NO-GO"}
        </p>
        {elapsed != null && <p className="text-sm" style={{ fontFamily: mono }}>{fmtTime(elapsed)}</p>}
      </div>
      {ungraded.length > 0 && (
        <p className="text-xs mt-1" style={{ color: amber }}>{ungraded.length} step(s) not yet graded.</p>
      )}
      {misses.length > 0 && (
        <div className="mt-2">
          <p className="text-xs font-bold" style={{ fontFamily: mono }}>REASON(S) FOR FAILURE</p>
          {misses.map((m) => (
            <p key={m.id} className="text-xs mt-0.5" style={{ color: noRed }}>{m.id}. {m.text}</p>
          ))}
        </div>
      )}
      <p className="text-xs mt-2 italic" style={{ color: "#5C5B52" }}>
        Per the sheet standard, all steps and measures must be performed correctly — a single NO-GO fails the task. Rebuttals for TCCC tasks go to the test board.
      </p>
      {onSave && (
        <button onClick={onSave} disabled={saved} className="mt-2 px-3 py-1.5 text-sm font-bold border rounded" style={{ borderColor: olive, color: saved ? "#9A9888" : olive }}>
          {saved ? "Attempt saved" : "Save attempt"}
        </button>
      )}
    </div>
  );
}

function fmtTime(s) {
  const m = Math.floor(s / 60), r = s % 60;
  return `${String(m).padStart(2, "0")}:${String(r).padStart(2, "0")}`;
}

function StudyMode({ stats }) {
  const [branch, setBranch] = useState("inguinal");
  const units = gradedUnits(branch);
  return (
    <div>
      <FormHeader />
      <div className="flex gap-2 mb-2 items-center">
        <span className="text-xs" style={{ color: "#5C5B52" }}>Junctional branch:</span>
        {["inguinal", "axillary", "neck"].map((b) => (
          <button key={b} onClick={() => setBranch(b)} className="text-xs px-2 py-1 border rounded"
            style={{ borderColor: branch === b ? olive : "#C9C7BC", background: branch === b ? olive : "transparent", color: branch === b ? "#FFF" : "#6B6A60" }}>
            {b}
          </button>
        ))}

function VerdictBadge({ verdict, source }) {
  const color = verdict === "GO" ? goGreen : noRed;
  const label = source === "override" ? " (yours)" : source === "keyword" ? " (kw)" : "";
  return (
    <span className="text-xs font-bold px-2 py-0.5 rounded" style={{ fontFamily: mono, background: verdict === "GO" ? "#DCEBDA" : "#F6E3E3", color }}>
      {verdict}{label}
    </span>
  );
}

// Run the whole scenario reciting each step; the cadre grades every step; then
// a verdict sheet shows GO/NO-GO for all steps and the board adjusts any of
// them. Each adjustment is stored (this browser) and fed back so the cadre
// grades that way next time.
function MentalMode({ scenario, onReroll, recordStat, cadre }) {
  const units = gradedUnits(scenario.junctional);
  const flat = gradeableOf(units);
  const [phase, setPhase] = useState("run"); // run | review
  const [idx, setIdx] = useState(0);
  const [recitals, setRecitals] = useState({});
  const [verdicts, setVerdicts] = useState({});
  const voice = useVoice();
  const [voiceOn, setVoiceOn] = useState(false);
  const [auto, setAuto] = useState(false); // hands-free: advance when the candidate pauses
  const [typed, setTyped] = useState("");

  const unit = flat[idx];
  const parent = unit && T1.steps.find((s) => s.subs && s.subs.some((x) => x.id === unit.id));

  const gradeStep = async (u, recital) => {
    let verdict = null, source = "keyword", correction = "", missing = [];
    if (cadre && recital.trim()) {
      const r = await askCadre(u, recital, examplesFor(u.id));
      if (!r.offline) {
        verdict = r.pass ? "GO" : "NO-GO";
        source = "cadre";
        correction = r.correction || "";
        missing = r.missing || [];
      }
    }
    if (!verdict) {
      const km = matchKeywords(recital, u.kw);
      verdict = recital.trim() && km.pass ? "GO" : "NO-GO";
      if (!recital.trim()) correction = "No recital given.";
    }
    setVerdicts((prev) => ({ ...prev, [u.id]: { verdict, source, correction, missing } }));
    recordStat(u.id, verdict);
  };

  const advance = (u, recital) => {
    setRecitals((prev) => ({ ...prev, [u.id]: recital }));
    setVerdicts((prev) => ({ ...prev, [u.id]: { pending: true } }));
    gradeStep(u, recital);
    setTyped("");
    voice.setTranscript("");
    if (idx + 1 < flat.length) setIdx(idx + 1);
    else { setAuto(false); setPhase("review"); }
  };

  const submit = () => advance(unit, (typed.trim() || voice.transcript || "").trim());

  // Hands-free loop: when auto is on, an arriving utterance is the current
  // step's recital — record it and advance.
  useEffect(() => {
    if (phase !== "run" || !auto || !voice.transcript) return;
    advance(flat[idx], voice.transcript.trim());
  }, [voice.transcript]);

  // Keep the mic re-armed for the next step while auto is on.
  useEffect(() => {
    if (phase !== "run" || !auto) return;
    if (voice.status === "idle" && !voice.transcript) {
      const t = setTimeout(() => voice.listen(), 150);
      return () => clearTimeout(t);
    }
  }, [phase, auto, idx, voice.status, voice.transcript]);

  // If the mic becomes unavailable, drop out of auto so the UI never gets stuck
  // "auto on but can't listen" — falls back to the manual speak/type controls.
  useEffect(() => {
    if (auto && (voice.status === "blocked" || voice.status === "unsupported")) setAuto(false);
  }, [auto, voice.status]);

  const toggleAuto = () => {
    const next = !auto;
    setAuto(next);
    if (!next) voice.stop();
  };

  const override = (u, newVerdict) => {
    if (!newVerdict) return; // ignore a click that would clear the verdict
    setVerdicts((prev) => ({ ...prev, [u.id]: { ...(prev[u.id] || {}), verdict: newVerdict, source: "override" } }));
    addExample(u.id, recitals[u.id] || "", newVerdict);
  };

  const restart = () => {
    setPhase("run"); setIdx(0); setRecitals({}); setVerdicts({});
    setTyped(""); voice.setTranscript(""); onReroll();
  };

  if (phase === "run") {
    return (
      <div>
        <ScenarioCard scenario={scenario} onReroll={onReroll} />
        <div className="flex items-center justify-between mb-2">
          <p className="text-xs" style={{ fontFamily: mono, color: "#5C5B52" }}>Step {idx + 1} of {flat.length} · {auto ? "auto — recite, pause to advance" : "reciting"}</p>
          <div className="flex gap-1">
            {voiceOn && voice.status !== "unsupported" && voice.status !== "blocked" && (
              <button onClick={toggleAuto} className="text-xs px-2 py-1 border rounded"
                style={{ fontFamily: mono, borderColor: auto ? olive : "#C9C7BC", background: auto ? olive : "transparent", color: auto ? "#FFF" : "#6B6A60" }}>
                Auto: {auto ? "on" : "off"}
              </button>
            )}
            <button onClick={() => { const n = !voiceOn; setVoiceOn(n); if (!n) { setAuto(false); voice.stop(); } }} className="text-xs px-2 py-1 border rounded"
              style={{ borderColor: voiceOn ? olive : "#C9C7BC", color: voiceOn ? olive : "#6B6A60" }}>
              Voice: {voiceOn ? "on" : "off"}
            </button>
          </div>
        </div>
        <div className="p-3" style={{ background: "#FFF", border: "1px solid #D6D3C4", borderRadius: 4 }}>
          {parent && <p className="text-xs font-bold mb-1" style={{ fontFamily: mono, color: olive }}>{parent.id}. {parent.text}</p>}
          <p className="text-sm font-bold" style={{ fontFamily: mono }}>Recite step {unit.id}:</p>
          <p className="text-sm italic mt-1" style={{ color: "#5C5B52" }}>Say or type the standard for this step. The cadre grades it; nothing reveals until the end.</p>
          {voiceOn && (
            <div className="mt-2">
              {voice.status === "unsupported" && <p className="text-xs" style={{ color: amber }}>Speech recognition isn't available in this browser — type the recital instead.</p>}
              {voice.status === "blocked" && <p className="text-xs" style={{ color: amber }}>Microphone access is blocked. Check the browser's site permissions, or type the recital instead.</p>}
              {auto && voice.status !== "unsupported" && voice.status !== "blocked" && (
                <p className="text-xs font-bold" style={{ fontFamily: mono, color: voice.status === "listening" ? goGreen : olive }}>
                  {voice.status === "listening" ? "● Listening — recite this step, then pause to advance" : "…arming mic"}
                </p>
              )}
              {!auto && voice.status !== "unsupported" && voice.status !== "blocked" && (
                <button onClick={voice.status === "listening" ? voice.stop : voice.listen}
                  className="px-3 py-1.5 text-sm font-bold border rounded"
                  style={{ borderColor: olive, background: voice.status === "listening" ? olive : "transparent", color: voice.status === "listening" ? "#FFF" : olive }}>
                  {voice.status === "listening" ? "Listening… tap to stop" : "Hold forth — tap to speak"}
                </button>
              )}
              {voice.transcript && <p className="text-xs mt-2 p-2 rounded" style={{ background: "#EFEDE2", fontFamily: mono }}>"{voice.transcript}"</p>}
            </div>
          )}
          <div className="mt-2">
            <input value={typed} onChange={(e) => setTyped(e.target.value)} placeholder="type your recital"
              onKeyDown={(e) => { if (e.key === "Enter") submit(); }}
              className="w-full text-xs p-2 border rounded" style={{ borderColor: "#C9C7BC", background: "#FFF" }} />
          </div>
          <div className="mt-3 flex gap-2">
            <button onClick={submit} className="flex-1 px-4 py-2 text-sm font-bold rounded" style={{ background: ink, color: "#FFF" }}>
              {idx + 1 < flat.length ? "Submit & next" : "Submit & finish"}
            </button>
            <button onClick={() => { setTyped(""); voice.setTranscript(""); submit(); }}
              className="px-3 py-2 text-xs font-bold border rounded" style={{ borderColor: "#C9C7BC", color: "#6B6A60" }}>
              Skip
            </button>
          </div>
        </div>
      </div>
    );
  }

  // review phase
  const anyPending = flat.some((u) => verdicts[u.id] && verdicts[u.id].pending);
  const misses = flat.filter((u) => verdicts[u.id] && verdicts[u.id].verdict === "NO-GO");
  const pass = !anyPending && misses.length === 0;
  return (
    <div>
      <ScenarioCard scenario={scenario} />
      <div className="p-3 mb-3" style={{ border: "1.5px solid " + ink, background: "#FFF" }}>
        <p className="font-bold text-lg" style={{ fontFamily: mono, color: anyPending ? amber : pass ? goGreen : noRed }}>
          TASK RESULT: {anyPending ? "GRADING…" : pass ? "GO" : "NO-GO"}
        </p>
        <p className="text-xs mt-1" style={{ color: "#5C5B52" }}>
          The cadre graded every step. Adjust any verdict below — your change is saved in this browser and teaches the cadre for next time. A single NO-GO fails the task.
        </p>
      </div>
      {units.map((u) =>
        u.isHeader ? (
          <StepText key={u.id} unit={u} />
        ) : (
          (() => {
            const v = verdicts[u.id] || {};
            return (
              <div key={u.id} className="py-2" style={{ borderBottom: "1px solid #E4E2D8" }}>
                <div className="flex gap-2 items-start justify-between">
                  <div className="flex-1">
                    <StepText unit={u} />
                    <p className="text-xs mt-1 ml-8" style={{ color: "#5C5B52", fontFamily: mono }}>
                      You said: {recitals[u.id] ? `"${recitals[u.id]}"` : "(nothing)"}
                    </p>
                    {v.verdict === "NO-GO" && v.correction && (
                      <p className="text-xs mt-1 ml-8" style={{ color: noRed }}>{v.correction}</p>
                    )}
                  </div>
                  <div className="pt-2 shrink-0 text-right">
                    {v.pending ? (
                      <span className="text-xs italic" style={{ color: olive }}>grading…</span>
                    ) : (
                      <div className="flex flex-col items-end gap-1">
                        <VerdictBadge verdict={v.verdict} source={v.source} />
                        <GoNoGo compact value={v.verdict || null} onChange={(g) => override(u, g)} />
                      </div>
                    )}
                  </div>
                </div>
              </div>
            );
          })()
        )
      )}
      <p className="text-xs mt-2 italic" style={{ color: "#5C5B52" }}>
        {exampleCount() > 0 ? `${exampleCount()} board decision(s) learned so far, guiding the cadre.` : "No board decisions recorded yet — adjust a verdict to teach the cadre."}
      </p>
      <button onClick={restart} className="mt-3 px-3 py-1.5 text-sm font-bold border rounded" style={{ borderColor: olive, color: olive }}>
        Run again with a new scenario
      </button>
    </div>
  );
}

function PhysicalMode({ scenario, onReroll, recordStat, cadre }) {
  const units = gradedUnits(scenario.junctional);
  const [phase, setPhase] = useState("brief"); // brief|running|grading
  const [elapsed, setElapsed] = useState(0);
  const [grades, setGrades] = useState({});
  const [saved, setSaved] = useState(false);
  const [aar, setAar] = useState(null);
  const [aarBusy, setAarBusy] = useState(false);
  const requestAAR = async () => {
    setAarBusy(true);
    const missed = gradeableOf(units).filter((u) => grades[u.id] === "NO-GO");
    const text = await askAAR(T1.task, missed, fmtTime(elapsed));
    setAar(text || "AI cadre unavailable — the cadre service didn't respond. Review the REASON(S) FOR FAILURE block above.");
    setAarBusy(false);
  };
  useEffect(() => {
    if (phase !== "running") return;
    const t = setInterval(() => setElapsed((e) => e + 1), 1000);
    return () => clearInterval(t);
  }, [phase]);

  const finishGrade = (id, g) => {
    setGrades((prev) => ({ ...prev, [id]: g }));
    recordStat(id, g);
  };

  return (
    <div>
      <ScenarioCard scenario={scenario} onReroll={phase === "brief" ? onReroll : undefined} />
      {phase === "brief" && (
        <div className="p-3" style={{ background: "#FFF", border: "1px solid #D6D3C4", borderRadius: 4 }}>
          <p className="text-sm leading-relaxed">Work the casualty physically — mannequin, buddy, or air-drill. The checklist stays hidden until you call it complete, exactly as it would on the lane. The clock runs; the lane budget for all seven TCCC tasks across three casualties is 1:45:00, so know what this task costs you.</p>
          <button onClick={() => setPhase("running")} className="mt-3 px-4 py-2 text-sm font-bold rounded w-full" style={{ background: goGreen, color: "#FFF" }}>
            Begin — start clock
          </button>
        </div>
      )}
      {phase === "running" && (
        <div className="p-3 text-center" style={{ background: "#FFF", border: "1px solid #D6D3C4", borderRadius: 4 }}>
          <p className="text-4xl font-bold" style={{ fontFamily: mono }}>{fmtTime(elapsed)}</p>
          <p className="text-xs mt-1" style={{ color: "#5C5B52" }}>Checklist concealed. Work the casualty.</p>
          <button onClick={() => setPhase("grading")} className="mt-3 px-4 py-2 text-sm font-bold rounded w-full" style={{ background: ink, color: "#FFF" }}>
            Task complete — reveal sheet and grade
          </button>
        </div>
      )}
      {phase === "grading" && (
        <div>
          <p className="text-xs mb-2 italic" style={{ color: "#5C5B52" }}>Grade every step honestly — GO only if you performed it, in substance and sequence. No middle option; the Pam has none.</p>
          {units.map((u) =>
            u.isHeader ? (
              <StepText key={u.id} unit={u} />
            ) : (
              <div key={u.id} className="flex items-start justify-between gap-2" style={{ borderBottom: "1px solid #E4E2D8" }}>
                <div className="flex-1"><StepText unit={u} /></div>
                <div className="py-2 shrink-0"><GoNoGo compact value={grades[u.id] || null} onChange={(g) => finishGrade(u.id, g)} /></div>
              </div>
            )
          )}
          <ResultPanel grades={grades} units={units} elapsed={elapsed} saved={saved}
            onSave={() => { setSaved(true); }} />
          {cadre && (
            <div className="mt-2">
              <button onClick={requestAAR} disabled={aarBusy} className="px-3 py-1.5 text-sm font-bold border rounded"
                style={{ borderColor: olive, color: aarBusy ? "#9A9888" : olive }}>
                {aarBusy ? "Cadre is writing…" : "Request cadre AAR"}
              </button>
              {aar && (
                <div className="mt-2 p-3" style={{ background: "#EFEDE2", border: "1px solid " + olive, borderRadius: 4 }}>
                  <p className="text-xs font-bold mb-1" style={{ fontFamily: mono, color: olive }}>CADRE AAR</p>
                  <p className="text-sm leading-relaxed whitespace-pre-wrap" style={{ color: ink }}>{aar}</p>
                </div>
              )}
            </div>
          )}
        </div>
      )}
    </div>
  );
}

function EFMBTrainer() {
  const [mode, setMode] = useState("study");
  const [cadre, setCadre] = useState(true);
  const [scenario, setScenario] = useState(SCENARIOS[Math.floor(Math.random() * SCENARIOS.length)]);
  const [progress, setProgress] = useState({ stepStats: {}, attempts: [] });
  const [gateNeeded, setGateNeeded] = useState(false);
  const [hasToken, setHasToken] = useState(!!getCadreToken());
  const [tokenDraft, setTokenDraft] = useState("");
  useEffect(() => { loadProgress().then(setProgress); }, []);
  useEffect(() => {
    const h = () => { setGateNeeded(true); setHasToken(false); };
    window.addEventListener("cadre-gate-required", h);
    return () => window.removeEventListener("cadre-gate-required", h);
  }, []);

  const recordStat = (id, g) => {
    setProgress((prev) => {
      const s = { ...(prev.stepStats[id] || { go: 0, nogo: 0, unsure: 0 }) };
      if (g === "GO") s.go += 1; else if (g === "NO-GO") s.nogo += 1; else s.unsure += 1;
      const next = { ...prev, stepStats: { ...prev.stepStats, [id]: s } };
      saveProgress(next);
      return next;
    });
  };

  const reroll = () => setScenario(SCENARIOS[Math.floor(Math.random() * SCENARIOS.length)]);

  const tabs = [
    ["study", "Study"],
    ["mental", "Mental drill"],
    ["physical", "Physical"],
  ];

  return (
    <div className="min-h-screen px-3 py-4" style={{ background: paper, color: ink, maxWidth: 720, margin: "0 auto" }}>
      <div className="mb-3">
        <p className="text-xs font-bold tracking-widest" style={{ fontFamily: mono, color: olive }}>EFMB LANE TRAINER · TCCC</p>
        <h1 className="text-xl font-bold" style={{ fontFamily: mono }}>T1 — Treat Massive Hemorrhage</h1>
      </div>

      <div className="p-2 mb-3 text-xs" style={{ background: "#F3EBD9", border: "1px solid #E0D5B8", borderRadius: 4, color: "#6B5A28" }}>
        <b>Baseline:</b> {T1.pamEdition} ({T1.sheetVersion}). <b>Not yet verified</b> against MEDCoE PAM 350-10, 1 JUN 2024 — pending Board Chair red-line. Train-up aid only; the signed Pam is the standard.
      </div>

      <div className="flex gap-1 mb-3">
        {tabs.map(([k, label]) => (
          <button key={k} onClick={() => setMode(k)} className="flex-1 py-2 text-sm font-bold border"
            style={{ fontFamily: mono, borderColor: mode === k ? ink : "#C9C7BC", background: mode === k ? ink : "transparent", color: mode === k ? "#FFF" : "#6B6A60", borderRadius: 3 }}>
            {label}
          </button>
        ))}
      </div>

      {mode !== "study" && (
        <div className="flex items-center justify-between mb-2 px-1">
          <p className="text-xs" style={{ color: "#5C5B52" }}>AI cadre — stops and corrects during drills</p>
          <button onClick={() => setCadre(!cadre)} className="text-xs px-2 py-1 font-bold border rounded"
            style={{ fontFamily: mono, borderColor: cadre ? olive : "#C9C7BC", background: cadre ? olive : "transparent", color: cadre ? "#FFF" : "#6B6A60" }}>
            {cadre ? "TRAIN-UP: CADRE ON" : "TEST WEEK: SILENT"}
          </button>
        </div>
      )}

      {mode !== "study" && cadre && gateNeeded && (
        <div className="p-2 mb-3 text-xs" style={{ background: "#EFEDE2", border: "1px solid #D6D3C4", borderRadius: 4 }}>
          <p style={{ color: "#5C5B52" }}>The AI cadre is gated during testing. Enter the access passphrase to enable it — stored only in this browser. Without it, the keyword check stands in.</p>
          <div className="mt-1 flex gap-1">
            <input type="password" value={tokenDraft} onChange={(e) => setTokenDraft(e.target.value)} placeholder="access passphrase"
              className="flex-1 text-xs p-2 border rounded" style={{ borderColor: "#C9C7BC", background: "#FFF" }} />
            <button onClick={() => { const t = tokenDraft.trim(); if (t) { saveCadreToken(t); setHasToken(true); setGateNeeded(false); setTokenDraft(""); } }}
              className="px-2 py-1 text-xs font-bold border rounded" style={{ borderColor: olive, color: olive }}>
              Save
            </button>
          </div>
        </div>
      )}

      {mode !== "study" && cadre && hasToken && !gateNeeded && (
        <p className="text-xs mb-3 px-1" style={{ color: "#8A887B" }}>
          Testing access set ·{" "}
          <button onClick={() => setGateNeeded(true)} style={{ textDecoration: "underline" }}>change</button>
        </p>
      )}

      {mode === "study" && <StudyMode stats={progress.stepStats} />}
      {mode === "mental" && <MentalMode scenario={scenario} onReroll={reroll} recordStat={recordStat} cadre={cadre} />}
      {mode === "physical" && <PhysicalMode scenario={scenario} onReroll={reroll} recordStat={recordStat} cadre={cadre} />}

      <p className="text-xs mt-4 text-center" style={{ color: "#8A887B" }}>
        Performance measures are verbatim from the published score sheet. Scenarios are generated; standards are not.
      </p>
    </div>
  );
}

const _root = ReactDOM.createRoot(document.getElementById("root"));
_root.render(React.createElement(EFMBTrainer));

</script>
