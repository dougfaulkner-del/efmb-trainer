const _mem = {};
window.storage = {
  async get(k){ try { const v = localStorage.getItem(k); return v==null? null : {key:k, value:v}; } catch { return _mem[k]? {key:k,value:_mem[k]} : null; } },
  async set(k,v){ try { localStorage.setItem(k,v); } catch { _mem[k]=v; } return {key:k,value:v}; }
};

// Flatten graded units for a given junctional branch
function gradedUnits(junctional) {
  const units = [];
  for (const step of T1.steps) {
    if (step.branch && step.branch !== junctional) continue;
    if (step.subs) {
      units.push({ ...step, isHeader: true });
      for (const s of step.subs) units.push(s);
    } else {
      units.push(step);
    }
  }
  return units;
}

const gradeableOf = (units) => units.filter((u) => !u.isHeader);

// VOICE — Web Speech API with graceful fallback
// ============================================================
function useVoice() {
  const [status, setStatus] = useState("idle"); // idle|listening|blocked|unsupported
  const [transcript, setTranscript] = useState("");
  const recRef = useRef(null);
  useEffect(() => {
    const SR = window.SpeechRecognition || window.webkitSpeechRecognition;
    if (!SR) { setStatus("unsupported"); return; }
    const rec = new SR();
    rec.continuous = false;
    rec.interimResults = false;
    rec.lang = "en-US";
    rec.onresult = (e) => { setTranscript(e.results[0][0].transcript); setStatus("idle"); };
    rec.onerror = (e) => { setStatus(e.error === "not-allowed" || e.error === "service-not-allowed" ? "blocked" : "idle"); };
    rec.onend = () => setStatus((s) => (s === "listening" ? "idle" : s));
    recRef.current = rec;
  }, []);
  const listen = () => {
    if (!recRef.current) return;
    setTranscript("");
    try { setStatus("listening"); recRef.current.start(); } catch { setStatus("blocked"); }
  };
  const stop = () => { try { recRef.current && recRef.current.stop(); } catch {} };
  return { status, transcript, listen, stop, setTranscript };
}

function matchKeywords(transcript, kw) {
  if (!transcript || !kw || kw.length === 0) return { hit: [], miss: kw || [], pass: false };
  const t = transcript.toLowerCase();
  const hit = [], miss = [];
  for (const k of kw) (t.includes(k.toLowerCase()) ? hit : miss).push(k);
  return { hit, miss, pass: hit.length / kw.length >= 0.6 };
}

// ============================================================
// AI CADRE — judges the match, never the standard.
// Verbatim sheet text is injected as the sole authority.
// Requires a visitor-supplied Anthropic API key: stored only in
// this browser's localStorage, sent only to api.anthropic.com.
// ============================================================
const KEY_STORE = "efmb-anthropic-key";
function getApiKey() { try { return localStorage.getItem(KEY_STORE) || ""; } catch { return ""; } }
function saveApiKey(k) { try { localStorage.setItem(KEY_STORE, k); } catch {} }
function clearApiKey() { try { localStorage.removeItem(KEY_STORE); } catch {} }

async function callClaude(prompt) {
  const key = getApiKey();
  if (!key) return null;
  const r = await fetch("https://api.anthropic.com/v1/messages", {
    method: "POST",
    headers: {
      "Content-Type": "application/json",
      "x-api-key": key,
      "anthropic-version": "2023-06-01",
      "anthropic-dangerous-direct-browser-access": "true",
    },
    body: JSON.stringify({ model: "claude-sonnet-4-6", max_tokens: 1000, messages: [{ role: "user", content: prompt }] }),
  });
  if (!r.ok) throw new Error("API error " + r.status);
  const d = await r.json();
  return (d.content || []).filter((b) => b.type === "text").map((b) => b.text).join("\n");
}

async function askCadre(unit, transcript) {
  const p = `You are an EFMB evaluator coaching a candidate during train-up week. The ONLY standard is the published performance measure from MEDCoE PAM 350-10 (Worksheet #T1), verbatim: "${unit.text}". Required elements: ${(unit.kw || []).join(", ")}. The candidate, reciting from memory, said: "${transcript}". Judge only whether the candidate captured the substance of the published measure. Do not add, update, or substitute any medical standard of your own. Respond ONLY with JSON, no markdown fences: {"pass": true or false, "missing": ["element", ...], "correction": "1-2 sentences in the voice of a firm, professional evaluator; quote the exact words of the published measure for anything missed"}`;
  try {
    const text = await callClaude(p);
    if (!text) return { offline: true };
    const parsed = JSON.parse(text.replace(/```json|```/g, "").trim());
    if (typeof parsed.pass !== "boolean") return { offline: true };
    return parsed;
  } catch {
    return { offline: true };
  }
}

async function askAAR(taskTitle, missed, elapsedStr) {
  const list = missed.map((m) => `${m.id}. ${m.text}`).join("\n");
  const p = `You are an EFMB evaluator giving a brief after-action review during train-up week. Task: ${taskTitle}. Candidate's time: ${elapsedStr}. The candidate self-graded NO-GO on these published performance measures (verbatim from MEDCoE PAM 350-10):\n${list || "(none — clean run)"}\nGive a 3-5 sentence AAR: acknowledge what passed, address each miss by step number quoting key words of the published measure, and give one concrete focus for the next repetition. Do not introduce any standard not listed above. Plain text only.`;
  try {
    return (await callClaude(p)) || null;
  } catch {
    return null;
  }
}

function ResultPanel({ grades, units, elapsed, onSave, saved }) {
  const gradeable = gradeableOf(units);
  const misses = gradeable.filter((u) => grades[u.id] === "NO-GO");
  const ungraded = gradeable.filter((u) => !grades[u.id]);
  const pass = misses.length === 0 && ungraded.length === 0;
  return (
    <div className="p-3 mt-3" style={{ border: "1.5px solid " + ink, background: "#FFF" }}>
      <div className="flex items-center justify-between">
        <p className="font-bold text-lg" style={{ fontFamily: mono, color: pass ? goGreen : noRed }}>

}

function fmtTime(s) {
  const m = Math.floor(s / 60), r = s % 60;
  return `${String(m).padStart(2, "0")}:${String(r).padStart(2, "0")}`;
}

// ============================================================
// MODES
// ============================================================
function StudyMode({ stats }) {
  const [branch, setBranch] = useState("inguinal");
  const units = gradedUnits(branch);
  return (
    <div>
      <FormHeader />
      <div className="flex gap-2 mb-2 items-center">
        <span className="text-xs" style={{ color: "#5C5B52" }}>Junctional branch:</span>
        {["inguinal", "axillary", "neck"].map((b) => (
          <button key={b} onClick={() => setBranch(b)} className="text-xs px-2 py-1 border rounded"
            style={{ borderColor: branch === b ? olive : "#C9C7BC", background: branch === b ? olive : "transparent", color: branch === b ? "#FFF" : "#6B6A60" }}>
            {b}
          </button>
        ))}
      </div>
      {units.map((u) => <StepText key={u.id} unit={u} showBadges stats={stats} />)}
    </div>
  );
}

function MentalMode({ scenario, onReroll, recordStat, cadre }) {
  const units = gradedUnits(scenario.junctional);
  const flat = gradeableOf(units);
  const [idx, setIdx] = useState(0);
  const [revealed, setRevealed] = useState(false);
  const [grades, setGrades] = useState({});
  const [done, setDone] = useState(false);
  const voice = useVoice();
  const [voiceOn, setVoiceOn] = useState(false);
  const [typed, setTyped] = useState("");
  const [cadreResp, setCadreResp] = useState(null);
  const [cadreBusy, setCadreBusy] = useState(false);
  const unit = flat[idx];
  const km = voice.transcript ? matchKeywords(voice.transcript, unit && unit.kw) : null;

  useEffect(() => {
    if (!cadre || !voice.transcript || revealed || done) return;
    let live = true;
    setCadreBusy(true);
    askCadre(unit, voice.transcript).then((r) => {
      if (!live) return;
      setCadreBusy(false);
      setCadreResp(r);
      if (r.offline || r.pass) setRevealed(true);
    });
    return () => { live = false; };
  }, [voice.transcript]);

  const mark = (g) => {
    const next = { ...grades, [unit.id]: g };
    setGrades(next);
    recordStat(unit.id, g);
    voice.setTranscript("");
    setTyped("");
    setCadreResp(null);
    if (idx + 1 < flat.length) { setIdx(idx + 1); setRevealed(false); }
    else setDone(true);
  };

  if (done) return (
    <div>
      <ScenarioCard scenario={scenario} />
      <ResultPanel grades={grades} units={units} elapsed={null} />
      <button onClick={() => { setIdx(0); setRevealed(false); setGrades({}); setDone(false); onReroll(); }}
        className="mt-3 px-3 py-1.5 text-sm font-bold border rounded" style={{ borderColor: olive, color: olive }}>
        Run again with a new scenario
      </button>
    </div>
  );

  const parent = T1.steps.find((s) => s.subs && s.subs.some((x) => x.id === unit.id));
  return (
    <div>
      <ScenarioCard scenario={scenario} onReroll={onReroll} />
      <div className="flex items-center justify-between mb-2">
        <p className="text-xs" style={{ fontFamily: mono, color: "#5C5B52" }}>Step {idx + 1} of {flat.length}</p>
        <button onClick={() => setVoiceOn(!voiceOn)} className="text-xs px-2 py-1 border rounded"
          style={{ borderColor: voiceOn ? olive : "#C9C7BC", color: voiceOn ? olive : "#6B6A60" }}>
          Voice: {voiceOn ? "on" : "off"}
        </button>
      </div>
      <div className="p-3" style={{ background: "#FFF", border: "1px solid #D6D3C4", borderRadius: 4 }}>
        {parent && <p className="text-xs font-bold mb-1" style={{ fontFamily: mono, color: olive }}>{parent.id}. {parent.text}</p>}
        <p className="text-sm font-bold" style={{ fontFamily: mono }}>Recall step {unit.id}:</p>
        {!revealed ? (
          <div className="mt-2">
            <p className="text-sm italic" style={{ color: "#5C5B52" }}>Say it out loud (or in your head), then reveal.</p>
            {voiceOn && (
              <div className="mt-2">
                {voice.status === "unsupported" && <p className="text-xs" style={{ color: amber }}>Speech recognition isn't available in this browser — recall verbally and reveal to self-check.</p>}
                {voice.status === "blocked" && <p className="text-xs" style={{ color: amber }}>Microphone access is blocked. Check the browser's site permissions for this page, then try again — or recall verbally here and self-check.</p>}
                {voice.status !== "unsupported" && voice.status !== "blocked" && (
                  <button onClick={voice.status === "listening" ? voice.stop : voice.listen}
                    className="px-3 py-1.5 text-sm font-bold border rounded"
                    style={{ borderColor: olive, background: voice.status === "listening" ? olive : "transparent", color: voice.status === "listening" ? "#FFF" : olive }}>
                    {voice.status === "listening" ? "Listening… tap to stop" : "Hold forth — tap to speak"}
                  </button>
                )}
                {voice.transcript && <p className="text-xs mt-2 p-2 rounded" style={{ background: "#EFEDE2", fontFamily: mono }}>"{voice.transcript}"</p>}
              </div>
            )}
            {cadre && (
              <div className="mt-2 flex gap-1">
                <input value={typed} onChange={(e) => setTyped(e.target.value)} placeholder="…or type your recital for the cadre"
                  className="flex-1 text-xs p-2 border rounded" style={{ borderColor: "#C9C7BC", background: "#FFF" }} />
                <button onClick={() => { if (typed.trim()) voice.setTranscript(typed.trim()); }}
                  className="px-2 py-1 text-xs font-bold border rounded" style={{ borderColor: olive, color: olive }}>
                  Submit
                </button>
              </div>
            )}
            {cadreBusy && <p className="text-xs mt-2 italic" style={{ color: olive }}>Cadre is listening…</p>}
            {cadreResp && !cadreResp.offline && !cadreResp.pass && !revealed && (
              <div className="mt-2 p-2" style={{ background: "#F6E3E3", border: "1.5px solid " + noRed, borderRadius: 4 }}>
                <p className="text-xs font-bold" style={{ fontFamily: mono, color: noRed }}>STOP — CORRECTION</p>
                <p className="text-sm mt-1" style={{ color: ink }}>{cadreResp.correction}</p>
                {cadreResp.missing && cadreResp.missing.length > 0 && (
                  <p className="text-xs mt-1" style={{ color: noRed }}>Missing: {cadreResp.missing.join(", ")}</p>
                )}
                <div className="mt-2 flex gap-2">
                  <button onClick={() => { voice.setTranscript(""); setTyped(""); setCadreResp(null); }}
                    className="px-3 py-1.5 text-xs font-bold rounded" style={{ background: noRed, color: "#FFF" }}>
                    Say it again
                  </button>
                  <button onClick={() => setRevealed(true)} className="px-3 py-1.5 text-xs font-bold border rounded" style={{ borderColor: ink, color: ink }}>
                    Show me the standard
                  </button>
                </div>
              </div>
            )}
            <button onClick={() => setRevealed(true)} className="mt-3 px-4 py-2 text-sm font-bold rounded w-full" style={{ background: ink, color: "#FFF" }}>
              Reveal standard
            </button>
          </div>
        ) : (
          <div className="mt-2">
            <StepText unit={unit} />
            {cadreResp && !cadreResp.offline && cadreResp.pass && (
              <p className="text-xs mt-1 p-2 rounded" style={{ background: "#DCEBDA", color: goGreen }}>
                <b style={{ fontFamily: mono }}>CADRE:</b> {cadreResp.correction || "Good — that captures the measure. Keep moving."}
              </p>
            )}
            {cadreResp && cadreResp.offline && (
              <p className="text-xs mt-1 italic" style={{ color: amber }}>AI cadre unavailable — no API key set, or the request failed. The keyword check below stands in.</p>
            )}
            {km && (
              <div className="text-xs mt-2 p-2 rounded" style={{ background: "#EFEDE2" }}>
                <p style={{ fontFamily: mono }}>Key elements {km.pass ? "covered" : "missed"}:</p>
                <p className="mt-1">
                  {km.hit.map((k) => <span key={k} className="inline-block mr-1 mb-1 px-1.5 rounded" style={{ background: "#DCEBDA", color: goGreen }}>{k}</span>)}
                  {km.miss.map((k) => <span key={k} className="inline-block mr-1 mb-1 px-1.5 rounded" style={{ background: "#F6E3E3", color: noRed }}>{k}</span>)}
                </p>
                <p className="mt-1 italic" style={{ color: "#5C5B52" }}>Suggestion only — you grade the rep. The transcript can be wrong; the standard can't.</p>
              </div>
            )}
            <p className="text-xs mt-2" style={{ color: "#5C5B52" }}>Did you have it — substance and sequence?</p>
            <div className="mt-1 flex items-center gap-2">
              <GoNoGo value={grades[unit.id] || null} onChange={mark} />
              <button onClick={() => mark("unsure")} className="px-2 py-1 text-xs border rounded" style={{ borderColor: amber, color: amber }}>
                Unsure — flag for study
              </button>
            </div>
          </div>
        )}
      </div>
    </div>
  );
}

function PhysicalMode({ scenario, onReroll, recordStat, cadre }) {
  const units = gradedUnits(scenario.junctional);
  const [phase, setPhase] = useState("brief"); // brief|running|grading
  const [elapsed, setElapsed] = useState(0);
  const [grades, setGrades] = useState({});
  const [saved, setSaved] = useState(false);
  const [aar, setAar] = useState(null);
  const [aarBusy, setAarBusy] = useState(false);
  const requestAAR = async () => {
    setAarBusy(true);
    const missed = gradeableOf(units).filter((u) => grades[u.id] === "NO-GO");
    const text = await askAAR(T1.task, missed, fmtTime(elapsed));
    setAar(text || "AI cadre unavailable — no API key set, or the request failed. Review the REASON(S) FOR FAILURE block above.");
    setAarBusy(false);
  };
  useEffect(() => {
    if (phase !== "running") return;
    const t = setInterval(() => setElapsed((e) => e + 1), 1000);
    return () => clearInterval(t);
  }, [phase]);

  const finishGrade = (id, g) => {
    setGrades((prev) => ({ ...prev, [id]: g }));
    recordStat(id, g);
  };

  return (
    <div>
      <ScenarioCard scenario={scenario} onReroll={phase === "brief" ? onReroll : undefined} />
      {phase === "brief" && (
        <div className="p-3" style={{ background: "#FFF", border: "1px solid #D6D3C4", borderRadius: 4 }}>
          <p className="text-sm leading-relaxed">Work the casualty physically — mannequin, buddy, or air-drill. The checklist stays hidden until you call it complete, exactly as it would on the lane. The clock runs; the lane budget for all seven TCCC tasks across three casualties is 1:45:00, so know what this task costs you.</p>
          <button onClick={() => setPhase("running")} className="mt-3 px-4 py-2 text-sm font-bold rounded w-full" style={{ background: goGreen, color: "#FFF" }}>
            Begin — start clock
          </button>
        </div>
      )}
      {phase === "running" && (
        <div className="p-3 text-center" style={{ background: "#FFF", border: "1px solid #D6D3C4", borderRadius: 4 }}>
          <p className="text-4xl font-bold" style={{ fontFamily: mono }}>{fmtTime(elapsed)}</p>
          <p className="text-xs mt-1" style={{ color: "#5C5B52" }}>Checklist concealed. Work the casualty.</p>
          <button onClick={() => setPhase("grading")} className="mt-3 px-4 py-2 text-sm font-bold rounded w-full" style={{ background: ink, color: "#FFF" }}>
            Task complete — reveal sheet and grade
          </button>
        </div>
      )}
      {phase === "grading" && (
        <div>
          <p className="text-xs mb-2 italic" style={{ color: "#5C5B52" }}>Grade every step honestly — GO only if you performed it, in substance and sequence. No middle option; the Pam has none.</p>
          {units.map((u) =>
            u.isHeader ? (
              <StepText key={u.id} unit={u} />
            ) : (
              <div key={u.id} className="flex items-start justify-between gap-2" style={{ borderBottom: "1px solid #E4E2D8" }}>
                <div className="flex-1"><StepText unit={u} /></div>
                <div className="py-2 shrink-0"><GoNoGo compact value={grades[u.id] || null} onChange={(g) => finishGrade(u.id, g)} /></div>
              </div>
            )
          )}
          <ResultPanel grades={grades} units={units} elapsed={elapsed} saved={saved}
            onSave={() => { setSaved(true); }} />
          {cadre && (
            <div className="mt-2">
              <button onClick={requestAAR} disabled={aarBusy} className="px-3 py-1.5 text-sm font-bold border rounded"
                style={{ borderColor: olive, color: aarBusy ? "#9A9888" : olive }}>
                {aarBusy ? "Cadre is writing…" : "Request cadre AAR"}
              </button>
              {aar && (
                <div className="mt-2 p-3" style={{ background: "#EFEDE2", border: "1px solid " + olive, borderRadius: 4 }}>
                  <p className="text-xs font-bold mb-1" style={{ fontFamily: mono, color: olive }}>CADRE AAR</p>
                  <p className="text-sm leading-relaxed whitespace-pre-wrap" style={{ color: ink }}>{aar}</p>
                </div>
              )}
            </div>
          )}
        </div>
      )}
    </div>
  );
}

// ============================================================
// APP
// ============================================================
function EFMBTrainer() {
  const [mode, setMode] = useState("study");
  const [cadre, setCadre] = useState(true);
  const [keySet, setKeySet] = useState(!!getApiKey());
  const [keyDraft, setKeyDraft] = useState("");
  const [scenario, setScenario] = useState(SCENARIOS[Math.floor(Math.random() * SCENARIOS.length)]);
  const [progress, setProgress] = useState({ stepStats: {}, attempts: [] });
  useEffect(() => { loadProgress().then(setProgress); }, []);

  const recordStat = (id, g) => {
    setProgress((prev) => {
      const s = { ...(prev.stepStats[id] || { go: 0, nogo: 0, unsure: 0 }) };
      if (g === "GO") s.go += 1; else if (g === "NO-GO") s.nogo += 1; else s.unsure += 1;
      const next = { ...prev, stepStats: { ...prev.stepStats, [id]: s } };
      saveProgress(next);
      return next;
    });
  };

  const reroll = () => setScenario(SCENARIOS[Math.floor(Math.random() * SCENARIOS.length)]);

  const tabs = [
    ["study", "Study"],
    ["mental", "Mental drill"],
    ["physical", "Physical"],
  ];

  return (
    <div className="min-h-screen px-3 py-4" style={{ background: paper, color: ink, maxWidth: 720, margin: "0 auto" }}>
      <div className="mb-3">
        <p className="text-xs font-bold tracking-widest" style={{ fontFamily: mono, color: olive }}>EFMB LANE TRAINER · TCCC</p>
        <h1 className="text-xl font-bold" style={{ fontFamily: mono }}>T1 — Treat Massive Hemorrhage</h1>
      </div>

      <div className="p-2 mb-3 text-xs" style={{ background: "#F3EBD9", border: "1px solid #E0D5B8", borderRadius: 4, color: "#6B5A28" }}>
        <b>Baseline:</b> {T1.pamEdition} ({T1.sheetVersion}). <b>Not yet verified</b> against MEDCoE PAM 350-10, 1 JUN 2024 — pending Board Chair red-line. Train-up aid only; the signed Pam is the standard.
      </div>

      <div className="flex gap-1 mb-3">
        {tabs.map(([k, label]) => (
          <button key={k} onClick={() => setMode(k)} className="flex-1 py-2 text-sm font-bold border"
            style={{ fontFamily: mono, borderColor: mode === k ? ink : "#C9C7BC", background: mode === k ? ink : "transparent", color: mode === k ? "#FFF" : "#6B6A60", borderRadius: 3 }}>
            {label}
          </button>
        ))}
      </div>

      {mode !== "study" && (
        <div className="flex items-center justify-between mb-2 px-1">
          <p className="text-xs" style={{ color: "#5C5B52" }}>AI cadre — stops and corrects during drills</p>
          <button onClick={() => setCadre(!cadre)} className="text-xs px-2 py-1 font-bold border rounded"
            style={{ fontFamily: mono, borderColor: cadre ? olive : "#C9C7BC", background: cadre ? olive : "transparent", color: cadre ? "#FFF" : "#6B6A60" }}>
            {cadre ? "TRAIN-UP: CADRE ON" : "TEST WEEK: SILENT"}
          </button>
        </div>
      )}

      {mode !== "study" && cadre && !keySet && (
        <div className="p-2 mb-3 text-xs" style={{ background: "#EFEDE2", border: "1px solid #D6D3C4", borderRadius: 4 }}>
          <p style={{ color: "#5C5B52" }}>The AI cadre needs an Anthropic API key. It is stored only in this browser and sent only to api.anthropic.com — never to this site. Without one, the keyword check stands in.</p>
          <div className="mt-1 flex gap-1">
            <input type="password" value={keyDraft} onChange={(e) => setKeyDraft(e.target.value)} placeholder="sk-ant-…"
              className="flex-1 text-xs p-2 border rounded" style={{ borderColor: "#C9C7BC", background: "#FFF" }} />
            <button onClick={() => { const k = keyDraft.trim(); if (k) { saveApiKey(k); setKeySet(true); setKeyDraft(""); } }}
              className="px-2 py-1 text-xs font-bold border rounded" style={{ borderColor: olive, color: olive }}>
              Save
            </button>
          </div>
        </div>
      )}

      {mode !== "study" && cadre && keySet && (
        <p className="text-xs mb-3 px-1" style={{ color: "#8A887B" }}>
          API key saved in this browser ·{" "}
          <button onClick={() => { clearApiKey(); setKeySet(false); }} style={{ textDecoration: "underline" }}>remove</button>
        </p>
      )}

      {mode === "study" && <StudyMode stats={progress.stepStats} />}
      {mode === "mental" && <MentalMode scenario={scenario} onReroll={reroll} recordStat={recordStat} cadre={cadre} />}
      {mode === "physical" && <PhysicalMode scenario={scenario} onReroll={reroll} recordStat={recordStat} cadre={cadre} />}

      <p className="text-xs mt-4 text-center" style={{ color: "#8A887B" }}>
        Performance measures are verbatim from the published score sheet. Scenarios are generated; standards are not.
      </p>
    </div>
  );
}

const _root = ReactDOM.createRoot(document.getElementById("root"));
_root.render(React.createElement(EFMBTrainer));

</script>
</body>
